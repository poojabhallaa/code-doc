name: Security Auto-Patch

on:
  push:
    branches:
      - '**'

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  sast-scan-and-patch:
    name: SAST Scan & Auto-Patch
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the orchestrator can diff/blame

      # ── 2. Python + Semgrep ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install semgrep
          # Install any extra packages your orchestrator needs
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ── 3. Run Semgrep ─────────────────────────────────────────────────────
      - name: Run Semgrep SAST scan
        id: semgrep
        # exit 0 even on findings so later steps still run;
        # the orchestrator decides what is actionable.
        run: |
          semgrep scan --config=auto --json > sast-report.json 2>semgrep-stderr.log || true

          # Count findings and expose as a step output
          FINDING_COUNT=$(python - <<'EOF'
          import json, sys
          try:
              data = json.load(open("sast-report.json"))
              print(len(data.get("results", [])))
          except Exception as e:
              print(0)
          EOF
          )
          echo "finding_count=$FINDING_COUNT" >> "$GITHUB_OUTPUT"
          echo "### Semgrep found $FINDING_COUNT vulnerability/ies" >> "$GITHUB_STEP_SUMMARY"

      # ── 4. Upload raw report as artifact (always) ──────────────────────────
      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: |
            sast-report.json
            semgrep-stderr.log
          retention-days: 30

      # ── 5. Trigger Python Orchestrator (only when findings exist) ──────────
      - name: Run Python Orchestrator
        if: steps.semgrep.outputs.finding_count != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Forward any secrets your orchestrator needs, e.g.:
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEMGREP_REPORT: sast-report.json
          REPO: ${{ github.repository }}
          SHA:  ${{ github.sha }}
          REF:  ${{ github.ref }}
        run: |
          echo "Vulnerabilities detected (${{ steps.semgrep.outputs.finding_count }} findings). Invoking orchestrator…"
          python scripts/orchestrator.py \
            --report   sast-report.json \
            --repo     "$REPO" \
            --sha      "$SHA" \
            --ref      "$REF"

      # ── 6. No-op notice when the repo is clean ─────────────────────────────
      - name: No vulnerabilities found
        if: steps.semgrep.outputs.finding_count == '0'
        run: echo "✅ Semgrep found no vulnerabilities. Nothing to patch."
